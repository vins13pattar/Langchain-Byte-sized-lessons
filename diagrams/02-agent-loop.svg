<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 680" font-family="-apple-system,Segoe UI,sans-serif">
<defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
<rect width="700" height="680" fill="#ffffff"/>
<text x="350.0" y="40" text-anchor="middle" font-size="22" font-weight="800" fill="#0F172A">The Agent Loop (ReAct)</text>
<rect x="70" y="86" width="320" height="64" rx="12" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="2"/><text x="230.0" y="123.0" text-anchor="middle" font-size="15" font-weight="700" fill="#1D4ED8">User HumanMessage</text>
<line x1="230.0" y1="150" x2="230.0" y2="196" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
<rect x="70" y="196" width="320" height="64" rx="12" fill="#F5F3FF" stroke="#6D28D9" stroke-width="2"/><text x="230.0" y="233.0" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">Model reasons -&gt; AIMessage</text>
<line x1="230.0" y1="260" x2="230.0" y2="306" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
<rect x="70" y="306" width="320" height="64" rx="12" fill="#F0FDF4" stroke="#15803D" stroke-width="2"/><text x="230.0" y="343.0" text-anchor="middle" font-size="15" font-weight="700" fill="#15803D">Tool executes -&gt; ToolMessage</text>
<line x1="230.0" y1="370" x2="230.0" y2="416" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
<rect x="70" y="416" width="320" height="64" rx="12" fill="#F5F3FF" stroke="#6D28D9" stroke-width="2"/><text x="230.0" y="453.0" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">Model reasons again</text>
<line x1="230.0" y1="480" x2="230.0" y2="526" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
<rect x="70" y="526" width="320" height="64" rx="12" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/><text x="230.0" y="563.0" text-anchor="middle" font-size="15" font-weight="700" fill="#C2410C">Final AIMessage (no tool calls)</text>
<path d="M390 558.0 H480 V118.0 H390" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arr)"/><text x="486" y="338.0" font-size="11" fill="#64748B" transform="rotate(90 486 338.0)" text-anchor="middle">loop until no tool calls</text>
<text x="350.0" y="658" text-anchor="middle" font-size="12.5" fill="#64748B">create_agent runs this until the model stops calling tools.</text>
</svg>