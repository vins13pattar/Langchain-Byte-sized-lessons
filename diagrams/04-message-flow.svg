<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 680" font-family="-apple-system,Segoe UI,sans-serif">
<defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
<rect width="560" height="680" fill="#ffffff"/>
<text x="280.0" y="40" text-anchor="middle" font-size="22" font-weight="800" fill="#0F172A">Message Types in a Conversation</text>
<rect x="120" y="86" width="320" height="64" rx="12" fill="#F8FAFC" stroke="#334155" stroke-width="2"/><text x="280.0" y="112.0" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">SystemMessage</text><text x="280.0" y="132.0" text-anchor="middle" font-size="11.5" fill="#475569">instructions / role</text>
<line x1="280.0" y1="150" x2="280.0" y2="196" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
<rect x="120" y="196" width="320" height="64" rx="12" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="2"/><text x="280.0" y="222.0" text-anchor="middle" font-size="15" font-weight="700" fill="#1D4ED8">HumanMessage</text><text x="280.0" y="242.0" text-anchor="middle" font-size="11.5" fill="#475569">user input</text>
<line x1="280.0" y1="260" x2="280.0" y2="306" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
<rect x="120" y="306" width="320" height="64" rx="12" fill="#F5F3FF" stroke="#6D28D9" stroke-width="2"/><text x="280.0" y="332.0" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">AIMessage</text><text x="280.0" y="352.0" text-anchor="middle" font-size="11.5" fill="#475569">reply or tool_calls</text>
<line x1="280.0" y1="370" x2="280.0" y2="416" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
<rect x="120" y="416" width="320" height="64" rx="12" fill="#F0FDF4" stroke="#15803D" stroke-width="2"/><text x="280.0" y="442.0" text-anchor="middle" font-size="15" font-weight="700" fill="#15803D">ToolMessage</text><text x="280.0" y="462.0" text-anchor="middle" font-size="11.5" fill="#475569">tool result</text>
<line x1="280.0" y1="480" x2="280.0" y2="526" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
<rect x="120" y="526" width="320" height="64" rx="12" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/><text x="280.0" y="552.0" text-anchor="middle" font-size="15" font-weight="700" fill="#C2410C">AIMessage (final)</text><text x="280.0" y="572.0" text-anchor="middle" font-size="11.5" fill="#475569">answer via .content / .content_blocks</text>
<text x="280.0" y="658" text-anchor="middle" font-size="12.5" fill="#64748B">State = the running list under messages. Reducers append new messages.</text>
</svg>